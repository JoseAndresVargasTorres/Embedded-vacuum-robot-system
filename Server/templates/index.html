<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Login/Signup Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class ="container">

        <!-- Login Form -->
        <div id="login-form"class="form-box login">
            <form action="/login" method="post">
                <h1>Login</h1>
                <div class="input-box">
                    <input name="username" id="username-login" type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i> <!-- Esto es para el logo -->
                </div>
                <div class="input-box">
                    <input name="password" id="password-login" type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" id="login-btn" class="btn">Login</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-box register">
            <form action="/register" method="post">
                <h1>Registration</h1>
                <div class="input-box">
                    <input name="username" id="username-register" type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i> <!-- Esto es para el logo -->
                </div>
                <div class="input-box">
                    <input name="email" id="email-register" type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input name="password" id="password-register" type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" id="register-btn" class="btn">Register</button>
            </form>
        </div>

        <!-- Toggle Box -->
        <div class="toggle-box">

            <!-- Toggle Box Left -->
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

             <!-- Toggle Box Right -->
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>

        </div>
    </div>
</body>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</html>
