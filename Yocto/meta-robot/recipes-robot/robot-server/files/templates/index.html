<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="robot-icon">🤖</div>
        <h1>Robot Control</h1>
        <p class="subtitle">Sistema de control autónomo</p>

        <div id="login-form" class="form-box login">
            <form>
                <div class="input-box">
                    <input id="username-login" type="text" placeholder="Usuario" required autocomplete="username">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input id="password-login" type="password" placeholder="Contraseña" required autocomplete="current-password">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div id="error-msg" class="error-msg"></div>
                <button type="submit" class="btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Ingresar
                </button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
