<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container-title">
        <div id="connection-status" class="connection-status">
            <p></p>
        </div>
        <div id="dashboard" class="form-box dashboard">
            <h1>Control System!</h1>
        </div>
    </div>

    <div class="container-music">
        <div class="line1">
            <select id="song-select">
                <option value="">-- Seleccionar canción --</option>
            </select>
            <h2 id="song-name">Song Title</h2>
            <p id="song-artist">mpg123</p>
        </div>

        <div class="line2">
            <button type="button" id="left-btn">
                <i class="fa-solid fa-angle-left"></i>
            </button>
            <button type="button" id="play-btn">
                <i id="play-icon" class="fa-regular fa-circle-play"></i>
            </button>
            <button type="button" id="right-btn">
                <i class="fa-solid fa-angle-right"></i>
            </button>
        </div>

        <div class="line3">
            <button type="button" id="high-btn">
                <i class="fa-solid fa-volume-high"></i>
            </button>
            <button type="button" id="low-btn">
                <i class="fa-solid fa-volume-low"></i>
            </button>
        </div>
    </div>

    <div class="container-leds">
        <p id="leds-info">LEDs Status</p>
        <hr>
    </div>

    <div class="container-sensors">
        <p id="sensors-info">Sensors Status</p>
        <hr>
    </div>

    <div class="container-control">
        <div class="line4">
            <button type="button" id="manual-btn" class="btn">Manual Mode</button>
            <button type="button" id="automatic-btn" class="btn">Automatic Mode</button>
        </div>

        <div class="line5">
            <button type="button" id="forward-btn" class="control-btn">
                <i class="fa-solid fa-arrow-up-long"></i>
            </button>
        </div>

        <div class="line6">
            <button type="button" id="left-control-btn" class="control-btn">
                <i class="fa-solid fa-arrow-left-long"></i>
            </button>
            <button type="button" id="stop-btn" class="control-btn">
                <i id="stop-icon" class="fa-solid fa-stop"></i>
            </button>
            <button type="button" id="right-control-btn" class="control-btn">
                <i class="fa-solid fa-arrow-right-long"></i>
            </button>
        </div>

        <div class="line7">
            <button type="button" id="backward-btn" class="control-btn">
                <i class="fa-solid fa-arrow-down-long"></i>
            </button>
        </div>
    </div>

    <div class="container-map">
        <p id="map-info">Map</p>
        <hr>
        <div id="map-grid"></div>
    </div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
