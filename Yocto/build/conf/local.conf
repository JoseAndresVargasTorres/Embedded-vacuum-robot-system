# --- Configuración de la Máquina ---
MACHINE = "raspberrypi4-64"
# --- Configuración del Sistema de Paquetes ---
PACKAGE_CLASSES ?= "package_rpm"
# --- Características de la Imagen ---
# Habilita SSH (OpenSSH) y permite login de root sin contraseña (desarrollo)
EXTRA_IMAGE_FEATURES ?= "debug-tweaks ssh-server-openssh empty-root-password allow-empty-password"
# --- Configuración de Hardware y Conectividad ---
# Habilitar UART para consola serial física
ENABLE_UART = "1"
# Memoria de video (mínimo para un sistema sin monitor)
GPU_MEM = "128"
# Características del sistema operativo (Soporte Wi-Fi, BT y Audio)
DISTRO_FEATURES:append = " wifi bluetooth bluez5 alsa"
# Instalación de drivers y firmware específicos de RPi4
IMAGE_INSTALL:append = " \
    linux-firmware-rpidistro-bcm43455 \
    wpa-supplicant \
    kernel-modules \
    alsa-utils \
    mpg123 \
"
# --- Herramientas de Desarrollo (Requisito ITCR) ---
IMAGE_INSTALL:append = " \
    python3 \
    python3-modules \
    cmake \
    gcc \
    g++ \
    binutils \
    libstdc++ \
    libstdc++-dev \
"
# --- Configuración de Disco y Descargas ---
DL_DIR ?= "${TOPDIR}/downloads"
SSTATE_DIR ?= "${TOPDIR}/sstate-cache"
# --- LICENCIAS ---
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"
# --- Ajustes de Compilación ---
# BB_NUMBER_THREADS = "8"
# PARALLEL_MAKE = "-j 8"
# Flask para servidor web
IMAGE_INSTALL:append = " python3-flask python3-pip"
# GPIO
IMAGE_INSTALL:append = " libgpiod"
# Audio RPi4 - habilitar jack 3.5mm
RPI_EXTRA_CONFIG = "dtparam=audio=on"
INHERIT += "extrausers"
EXTRA_USERS_PARAMS = "usermod -p '\$1\$jrKf1ye5\$mg2DI8iiAd3aJQT/aW6N81' root;"
# Habilitar PWM por hardware en RPi4
RPI_EXTRA_CONFIG:append = "\ndtoverlay=pwm-2chan,pin=18,func=2,pin2=19,func2=2"
# HDMI forzado
RPI_EXTRA_CONFIG:append = "\nhdmi_force_hotplug=1"
RPI_EXTRA_CONFIG:append = "\nhdmi_group=1"
RPI_EXTRA_CONFIG:append = "\nhdmi_mode=4"
RPI_EXTRA_CONFIG:append = "\ndtoverlay=vc4-fkms-v3d"
# Incluir overlays de RPi4
RPI_KERNEL_DEVICETREE_OVERLAYS:append = " overlays/pwm-2chan.dtbo"
# Deshabilitar gold linker para evitar problemas de compilación
PACKAGECONFIG:remove:pn-binutils = "gold"
